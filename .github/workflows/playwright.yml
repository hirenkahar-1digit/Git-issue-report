name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      id: playwright
      run: npx playwright test
      continue-on-error: true

    - name: Extract failed test title
      id: extract
      if: steps.playwright.outcome == 'failure'
      run: |
        TITLE=$(node -e "
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));

          function findFailedTitle(suites) {
            for (const suite of suites) {
              for (const spec of suite.specs || []) {
                for (const test of spec.tests || []) {
                  const failed = test.results?.some(r => r.status !== 'passed');
                  if (failed) return spec.title;
                }
              }
              if (suite.suites) {
                const nested = findFailedTitle(suite.suites);
                if (nested) return nested;
              }
            }
            return null;
          }

          console.log(findFailedTitle(results.suites) || 'Unknown test');
        ")
        echo "test_title=$TITLE" >> "$GITHUB_OUTPUT"

    - name: Create GitHub Issue with screenshot
      if: steps.playwright.outcome == 'failure'
      uses: actions/github-script@v7
      env:
        RUN_ID: ${{ github.run_id }}
        TEST_TITLE: ${{ steps.extract.outputs.test_title }}
      with:
        script: |
          const runId = process.env.RUN_ID;
          const testTitle = process.env.TEST_TITLE;
          const branch = context.ref.replace('refs/heads/', '');
          const imageUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/.github/issue-screenshots/failure-${runId}.png`;
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Playwright test failed: ${testTitle}`,
            body: [
              `**Playwright test run failed** on commit \`${context.sha}\`.`,
              '',
              `**Test:** ${testTitle}`,
              '',
              `![Failure Screenshot](${imageUrl})`,
              '',
              `[View full workflow run](${runUrl})`,
              `Triggered by: @${context.actor}`
            ].join('\n')
          });