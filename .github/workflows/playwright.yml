name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      id: playwright
      run: npx playwright test
      continue-on-error: true

    - name: Upload test results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-test-results
        path: |
          test-results.json
          test-results/
        retention-days: 30

    - name: Extract failed test details
      id: extract
      if: steps.playwright.outcome == 'failure'
      run: |
        node -e "
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));

          function findFailedTest(suites) {
            for (const suite of suites) {
              for (const spec of suite.specs || []) {
                for (const test of spec.tests || []) {
                  const failedResult = test.results?.find(r => r.status !== 'passed');
                  if (failedResult) return { title: spec.title, error: failedResult.error?.message || 'No error message' };
                }
              }
              if (suite.suites) {
                const nested = findFailedTest(suite.suites);
                if (nested) return nested;
              }
            }
            return null;
          }

          const failed = findFailedTest(results.suites);
          const title = failed ? failed.title : 'Unknown test';
          const errorMsg = failed ? failed.error : 'No error details found.';
          
          fs.writeFileSync('test_title.txt', title);
          fs.writeFileSync('test_error.txt', errorMsg);
        "
        echo "test_title=$(cat test_title.txt)" >> "$GITHUB_OUTPUT"
        
        echo 'test_error<<EOF' >> "$GITHUB_OUTPUT"
        cat test_error.txt >> "$GITHUB_OUTPUT"
        echo 'EOF' >> "$GITHUB_OUTPUT"

    - name: Commit and push screenshot
      if: steps.playwright.outcome == 'failure'
      run: |
        mkdir -p .github/issue-screenshots
        # Find the first screenshot in test-results
        SCREENSHOT=$(find test-results -name "*-failure.png" | head -n 1)
        if [ -n "$SCREENSHOT" ]; then
          cp "$SCREENSHOT" .github/issue-screenshots/failure-${{ github.run_id }}.png
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/issue-screenshots/failure-${{ github.run_id }}.png
          git commit -m "Add test failure screenshot for run ${{ github.run_id }}"
          git push
        else
          echo "No screenshot found."
        fi

    - name: Create GitHub Issue with screenshot
      if: steps.playwright.outcome == 'failure'
      uses: actions/github-script@v7
      env:
        RUN_ID: ${{ github.run_id }}
        TEST_TITLE: ${{ steps.extract.outputs.test_title }}
        TEST_ERROR: ${{ steps.extract.outputs.test_error }}
      with:
        script: |
          const runId = process.env.RUN_ID;
          const testTitle = process.env.TEST_TITLE;
          const testError = process.env.TEST_ERROR;
          const branch = context.ref.replace('refs/heads/', '');
          const imageUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/.github/issue-screenshots/failure-${runId}.png`;
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Playwright test failed: ${testTitle}`,
            body: [
              `**Playwright test run failed** on commit \`${context.sha}\`.`,
              '',
              `**Test:** ${testTitle}`,
              '',
              '**Error Details:**',
              '<details><summary>Click to expand error</summary>',
              '',
              '```text',
              testError,
              '```',
              '',
              '</details>',
              '',
              `![Failure Screenshot](${imageUrl})`,
              '',
              `[View full workflow run & download test results](${runUrl})`,
              `Triggered by: @${context.actor}`
            ].join('\n')
          });