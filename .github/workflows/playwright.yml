name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests 
      id: playwright
      run: npx playwright test --workers=1
      continue-on-error: true

    - name: Upload test results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-test-results
        path: |
          test-results.json
          test-results/
        retention-days: 30

    - name: Extract failed test details
      id: extract
      if: steps.playwright.outcome == 'failure'
      run: |
        node -e "
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));

          function findFailedTests(suites, failedTests = []) {
            for (const suite of suites) {
              for (const spec of suite.specs || []) {
                for (const test of spec.tests || []) {
                  const failedResult = test.results?.find(r => r.status !== 'passed');
                  if (failedResult) {
                     const rawError = failedResult.error?.message || 'No error message';
                     const cleanError = rawError.replace(/\u001b\[[0-9;]*[a-zA-Z]/g, '');
                     failedTests.push({ title: spec.title, error: cleanError });
                  }
                }
              }
              if (suite.suites) {
                findFailedTests(suite.suites, failedTests);
              }
            }
            return failedTests;
          }

          const failed = findFailedTests(results.suites);
          fs.writeFileSync('failed_tests.json', JSON.stringify(failed));
        "

    - name: Commit and push screenshot
      if: steps.playwright.outcome == 'failure'
      run: |
        mkdir -p .github/issue-screenshots
        HAS_SCREENSHOTS=0
        for SCREENSHOT in test-results/*-failure.png; do
          if [ -f "$SCREENSHOT" ]; then
            BASENAME=$(basename "$SCREENSHOT" -failure.png)
            DEST=".github/issue-screenshots/${BASENAME}-failure-${{ github.run_id }}.png"
            cp "$SCREENSHOT" "$DEST"
            git add "$DEST"
            HAS_SCREENSHOTS=1
          fi
        done
        
        if [ $HAS_SCREENSHOTS -eq 1 ]; then
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add test failure screenshots for run ${{ github.run_id }}"
          git push
        else
          echo "No screenshot found."
        fi

    - name: Create GitHub Issues
      if: steps.playwright.outcome == 'failure'
      uses: actions/github-script@v7
      env:
        RUN_ID: ${{ github.run_id }}
      with:
        script: |
          const fs = require('fs');
          const failures = JSON.parse(fs.readFileSync('failed_tests.json', 'utf8'));
          if (failures.length === 0) return;

          const runId = process.env.RUN_ID;
          const branch = context.ref.replace('refs/heads/', '');
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
          
          for (const failure of failures) {
             const safeTitle = failure.title.replace(/[^a-z0-9-_]/gi, '_');
             const imgUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/.github/issue-screenshots/${safeTitle}-failure-${runId}.png`;

             await github.rest.issues.create({
               owner: context.repo.owner,
               repo: context.repo.repo,
               title: `Playwright test failed: ${failure.title}`,
               body: [
                 `**Playwright test run failed** on commit \`${context.sha}\`.`,
                 '',
                 `**Test:** ${failure.title}`,
                 '',
                 '**Error Details:**',
                 '<details><summary>Click to expand error</summary>',
                 '',
                 '```text',
                 failure.error,
                 '```',
                 '',
                 '</details>',
                 '',
                 `![Failure Screenshot](${imgUrl})`,
                 '',
                 `[View full workflow run & download test results](${runUrl})`,
                 `Triggered by: @${context.actor}`
               ].join('\n')
             });
          }